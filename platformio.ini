; PlatformIO Configuration for RejsaCAN v6.x ESP32-C6
; Renault Zoe ZE50 Phase 2 CAN Logger
; Hardware: ESP32-C6-MINI-1-N4 with SN65HVD230 CAN transceiver

[env:esp32c6]
platform = espressif32
board = esp32-c6-devkitc-1
framework = arduino

; Build flags
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_FREERTOS_HZ=1000
    -Wall
    -Wextra

; Monitor settings
monitor_speed = 115200
monitor_filters = 
    default
    time

; Upload settings
upload_speed = 921600

; Dependencies
lib_deps = 
    bblanchon/ArduinoJson@^7.2.0

; Custom build directory structure
build_dir = .pio/build
lib_dir = lib
src_dir = src
include_dir = include
